services:
  zerollama:
    build: .
    container_name: zerollama
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      # Ollama must be reachable from the container.
      # If Ollama runs on the host, use host.docker.internal on macOS/Windows
      # or the host gateway IP on Linux.
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      PORT: ${PORT:-3001}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-1}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-5}
      # Optional: set to require an API key for all requests
      ZEROLLAMA_API_KEY: ${ZEROLLAMA_API_KEY:-}
      # Optional: POST response summaries to this URL after each completion
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    volumes:
      # Persist settings (default model, Ollama config) across container restarts
      - zerollama-data:/root/.zerollama
    extra_hosts:
      # Allow container to reach Ollama running on the host (Linux)
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  zerollama-data:
